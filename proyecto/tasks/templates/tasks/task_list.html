<h2>Task List</h2>
<a href="{% url 'task_create' %}">Crear una nueva tarea</a>
<ul>
    {% for task in tasks %}
    <li>
        {{ task.title }} - {{ task.description }}
        <a href="{% url 'task_update' task.pk %}">Editar</a>
        <a href="{% url 'task_delete' task.pk %}">Eliminar</a>
    </li>
    {% endfor %}
</ul>
